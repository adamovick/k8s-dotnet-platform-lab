apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: dotnet-webapp-ingress

spec:
  ingressClassName: nginx

  rules:

  - host: app.kral.local

    http:

      paths:

      - path: /
        pathType: Prefix

        backend:

          service:
            name: dotnet-webapp

            port:
              number: 80
  - host: canary.kral.local

    http:

      paths:

      - path: /
        pathType: Prefix

        backend:

          service:
            name: dotnet-webapp-canary

            port:
              number: 80